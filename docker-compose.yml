services:

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/sensordb
      - APP_CONFIG=production
      - CORS_ORIGINS=http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      retries: 5
      start_period: 15s
      timeout: 5s

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "sensor_api.worker"]
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/sensordb
      - APP_CONFIG=production
      - SAMPLE_INTERVAL_SECONDS=10
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Liveness: confirm the worker process (PID 1) is still running.
    healthcheck:
      test: ["CMD-SHELL", "grep -q sensor_api.worker /proc/1/cmdline"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

  frontend:
    build:
      context: ./frontend
    # nginx serves the production bundle on port 80 and proxies /api to the
    # backend (see frontend/nginx.conf). The API base URL is a build-time
    # setting in src/environments/* — not a runtime env var.
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 15s
      retries: 5
      start_period: 10s
      timeout: 5s

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensordb
    # The DB port is intentionally not published to the host. Services reach
    # it over the compose network as db:5432; for host access use
    # `docker compose exec db psql -U postgres -d sensordb`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "sensordb"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  # Grafana visualizes the sensor_data table. Datasource and dashboards are
  # provisioned as code from deploy/grafana/provisioning (CLAUDE.md §2.8) —
  # nothing is configured through the UI. DB credentials are passed via env
  # and interpolated in the datasource YAML; no secrets are committed.
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Consumed by deploy/grafana/provisioning/datasources/datasource.yaml.
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sensordb
      - POSTGRES_SSLMODE=disable
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 15s
      retries: 5
      start_period: 20s
      timeout: 5s

  # One-shot schema migration. Runs `flask db upgrade` once the DB is
  # healthy, then exits; backend and worker wait for it to complete
  # successfully (schema comes from Alembic, never db.create_all()). Reuses
  # the backend image, so it already has the code and migrations/.
  migrate:
    build:
      context: ./backend
    command: ["flask", "--app", "sensor_api", "db", "upgrade"]
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/sensordb
      - APP_CONFIG=production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
