services:

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/sensordb
      - APP_CONFIG=production
      - CORS_ORIGINS=http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      retries: 5
      start_period: 15s
      timeout: 5s

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/sensordb
      - APP_CONFIG=production
      - SAMPLE_INTERVAL_SECONDS=10
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Liveness: confirm the worker process (PID 1) is still running.
    healthcheck:
      test: ["CMD-SHELL", "grep -q worker.py /proc/1/cmdline"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:4200"
    # The API base URL is a build-time setting in src/environments/*, not a
    # runtime env var (the old REACT_APP_BACKEND_URL was a React var, never
    # read by this Angular app).
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4200/ || exit 1"]
      interval: 15s
      retries: 5
      # ng serve compiles on first boot, so allow generous start-up time.
      start_period: 60s
      timeout: 5s

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensordb
    # The DB port is intentionally not published to the host. Services reach
    # it over the compose network as db:5432; for host access use
    # `docker compose exec db psql -U postgres -d sensordb`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "sensordb"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

volumes:
  postgres_data:
    driver: local
