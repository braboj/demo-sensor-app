name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy --strict)
        run: mypy src

      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test (karma, headless Chrome)
        run: npm test

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy is CI-triggered, not push-based (ADR-0009): render.yaml sets
  # autoDeploy:false, and this job POSTs a Render deploy hook per service once
  # the checks above pass on main. Each POST is skipped when its secret is unset,
  # so the workflow stays green before the hooks exist and on forks / PRs.
  deploy:
    name: Deploy (Render hooks)
    runs-on: ubuntu-latest
    needs: [backend, frontend, gitleaks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploys
        env:
          BACKEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          FRONTEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
          GRAFANA_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_GRAFANA }}
        run: |
          trigger() {
            name="$1"
            hook="$2"
            if [ -z "$hook" ]; then
              echo "::notice::$name deploy hook unset — skipping"
              return 0
            fi
            echo "Triggering $name deploy…"
            curl -fsS -X POST "$hook" > /dev/null
            echo "$name deploy triggered."
          }
          trigger backend "$BACKEND_HOOK"
          trigger frontend "$FRONTEND_HOOK"
          trigger grafana "$GRAFANA_HOOK"
