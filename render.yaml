# Render Blueprint — deploys the sensor dashboard on the free tier.
#
#   db        managed PostgreSQL (free)
#   backend   Docker web service: gunicorn on $PORT, migrations on boot, and
#             the sensor generator in-process (free tier has no worker dynos)
#   frontend  static site: Angular SPA built with the backend URL baked in
#
# Connect the repo in the Render dashboard ("New +" -> "Blueprint"). See
# docs/DEPLOY.md for the full walkthrough and the free-tier caveats.
#
# NOTE: the two cross-service URLs below are derived from the service names. If
# Render appends a suffix because a name is already taken in your account,
# update CORS_ORIGINS and API_URL to the real URLs and redeploy.

databases:
  - name: sensor-app-db
    databaseName: sensordb
    user: sensor
    plan: free

services:
  # --- Backend: Flask API under gunicorn, in a Docker container ---
  - type: web
    name: sensor-app-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Free tier has no pre-deploy step, so migrate then serve in one command;
    # gunicorn.conf.py binds $PORT and starts the in-process generator.
    dockerCommand: sh render-start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_CONFIG
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sensor-app-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # The static site's origin — keep in sync with the frontend service URL.
      - key: CORS_ORIGINS
        value: https://sensor-app-frontend.onrender.com
      # Free tier: no separate worker, so generate readings in-process.
      - key: RUN_INPROCESS_GENERATOR
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SAMPLE_INTERVAL_SECONDS
        value: "10"

  # --- Frontend: Angular SPA served as a static site on Render's CDN ---
  - type: web
    name: sensor-app-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/sensor-app/browser
    autoDeploy: true
    envVars:
      # Baked into the bundle at build time by scripts/set-api-url.mjs — the
      # absolute backend endpoint, since the SPA and API are different origins.
      - key: API_URL
        value: https://sensor-app-backend.onrender.com/api/v1/sensors
      # Surfaces the in-app "View charts in Grafana" link (also baked at build
      # time). Points at the provisioned dashboard on the grafana service below.
      - key: GRAFANA_URL
        value: https://sensor-app-grafana.onrender.com/d/sensor-readings/sensor-readings
    routes:
      # SPA fallback: let Angular's router handle deep links.
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Grafana: dashboards over the managed Postgres, provisioned as code ---
  - type: web
    name: sensor-app-grafana
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/grafana/Dockerfile
    dockerContext: ./deploy/grafana
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Render exposes the managed DB as a connection string (host/port are not
      # individually referenceable); the entrypoint parses it into the
      # POSTGRES_* vars the datasource.yaml interpolates.
      - key: DATABASE_URL
        fromDatabase:
          name: sensor-app-db
          property: connectionString
      # Free tier has no persistent disk, so users/settings reset on restart;
      # the dashboard + datasource come from baked-in provisioning, and an
      # anonymous Viewer role lets the public link work without a login.
      - key: GF_AUTH_ANONYMOUS_ENABLED
        value: "true"
      - key: GF_AUTH_ANONYMOUS_ORG_ROLE
        value: Viewer
      - key: GF_USERS_ALLOW_SIGN_UP
        value: "false"
      # Admin password for the (otherwise read-only) instance; generated, never
      # committed. Reset on each deploy, which is fine for a provisioned setup.
      - key: GF_SECURITY_ADMIN_PASSWORD
        generateValue: true
      # Grafana sits behind Render's TLS proxy; tell it its external URL so
      # generated links and assets resolve.
      - key: GF_SERVER_ROOT_URL
        value: https://sensor-app-grafana.onrender.com
