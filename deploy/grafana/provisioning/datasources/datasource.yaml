# Grafana datasource, provisioned as code (CLAUDE.md §2.8).
# Connection fields are interpolated from environment variables — no secrets
# are committed here. docker-compose.yml passes them directly; on Render the
# entrypoint (deploy/grafana/render-entrypoint.sh) derives them from the managed
# database's connection string.
apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: sensordb-pg
    type: postgres
    access: proxy
    url: ${POSTGRES_HOST}:${POSTGRES_PORT}
    user: ${POSTGRES_USER}
    # `database` is the canonical top-level field for SQL datasources.
    database: ${POSTGRES_DB}
    isDefault: true
    # Managed by provisioning — do not allow edits through the UI.
    editable: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      # `disable` for the compose stack; `require` on Render (managed PG needs SSL).
      sslmode: ${POSTGRES_SSLMODE}
      postgresVersion: 1600
      timescaledb: false
